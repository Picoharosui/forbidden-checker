<!DOCTYPE html>
<html lang="ja">
<head>
    <meta name="google-site-verification" content="kYSTsQG0PEaxJpGBddUcnxHhV4-vb4v6JPl7PsynvVo" />
    <meta charset="UTF-8">
    <meta name="description" content="ハロスイにて投稿する際に、フィルターに引っかかった文章を素早く確認できるツールです。">
    <meta name="keywords" content="ハロスイ, ハロースイートデイズ, 禁止ワード, NGワード, 使用できない語句, チェッカー, ツール,掲示板">
    <title>ハロースイートデイズ禁止ワードチェッカー</title>
    <style>
        body { 
            padding: 20px; 
            font-family: sans-serif; 
            max-width: 600px; 
            margin: 0 auto; 
        }
        textarea { 
            width: 100%; 
            height: 200px; 
            font-size: 16px; 
            padding: 10px; 
            box-sizing: border-box; 
            border: 2px solid #ccc;
            border-radius: 8px;
        }
        button { 
            width: 100%; 
            padding: 15px; 
            font-size: 1.2em; 
            margin-top: 15px; 
            background-color: #007bff; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer;
        }
        button:active { background-color: #0056b3; }
        #out { margin-top: 20px; line-height: 1.6; }
    </style>
</head>
<body>
    
    <div style="text-align: center; margin-bottom: 20px;">
    <h1 style="font-size: 2em; margin-bottom: 5px;">ハロスイ禁止ワードチェッカー</h1>
    <p style="color: gray; font-size: 0.9em;">以下に文書を貼り付け、下の青いボタンを押してください。規制フィルターに引っかかっている箇所が色付けされます。</p>
    </div>
    
    <textarea id="in" style="width: 80%; height: 200px; display: block; margin: 0 auto;"></textarea>
    <button onclick="check()" style="display: block; margin: 20px auto; width: 80%; padding: 15px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer;">チェック</button>
    <div id="out" style="width: 80%; margin: 20px auto;"></div>

    <script>
        async function check() {
            let txt = document.getElementById('in').value;
            
            // warning.txt と normal.txt を読み込む
            const resWarn = await fetch('warning.txt');
            const resNorm = await fetch('normal.txt');
            const warnWords = (await resWarn.text()).split('\n').filter(w => w.trim() !== "");
            const normWords = (await resNorm.text()).split('\n').filter(w => w.trim() !== "");

            let isWarningFound = false;

           // 警告ワードの判定
            warnWords.forEach(w => {
           // リストに書かれている言葉(w)が、入力文章の中に「そのまま」含まれているかチェック
                if (w && txt.includes(w)) {
                    isWarningFound = true;
                    let escapedW = w.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                    let r = new RegExp(escapedW, 'g');
                    txt = txt.replace(r, `<span style="background:red; color:white; font-weight:bold;">${w}</span>`);
                }
            });
            
        　　// 通常ワードの判定
            normWords.forEach(w => {
                if (w && txt.includes(w)) {
                    let escapedW = w.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                    let r = new RegExp(escapedW, 'g');
                    txt = txt.replace(r, `<span style="background:yellow;">${w}</span>`);
                }
            });
            // 結果を表示
            let alertMsg = isWarningFound ? 
                '<br><br><b style="color:red; font-size:1.2em;">⚠️警告：本当にこの言葉を使いますか？（人を傷つける目的で使用しませんか？）</b>' : '';
            
            document.getElementById('out').innerHTML = txt + alertMsg;
        }
    </script>
</body>
</html>
